  name: Daily City Weather Harvester

  on:
    workflow_dispatch:

  jobs:
    harvest:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      concurrency:
        group: vertex-soiling-main-push
        cancel-in-progress: false

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Install dependencies
          run: pip install requests

        - name: Run Harvester
          env:
            OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          run: python city_harvester.py

        - name: Commit Daily JSON
          run: |
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add weather_cache/*.json
            git commit -m "Add weather data for $(date +'%Y-%m-%d') [skip ci]" || echo "No changes"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "Push rejected (attempt $i), retrying after backoff..."
              sleep $(( (RANDOM % 10) + 5 ))
            done
